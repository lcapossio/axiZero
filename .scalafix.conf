# scalafix rules for axiZero
# Run: sbt "scalafix"          — apply fixes in-place
# Run: sbt "scalafix --check"  — CI check (fails if any rewrite is needed)
rules = [
  DisableSyntax
  NoAutoTupling
]

DisableSyntax.noVars = false        # SpinalHDL components use var internally
DisableSyntax.noXml = true
DisableSyntax.noDefaultArgs = false # SpinalHDL APIs use default args pervasively
DisableSyntax.noFinalVal = false
DisableSyntax.noValPatterns = false
DisableSyntax.noUniversalEquality = false
