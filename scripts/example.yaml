# axiZero interconnect configuration
# Run with: python axizero.py generate example.yaml

designs:

  # ── Example 1: simple 1-master × 4-slave AXI4-Lite crossbar ─────────────
  - name: MyLite_1M4S
    type: lite
    arbitration: round_robin

    masters:
      - addr_width: 32
        data_width: 32
        reg_slice: false

    slaves:
      - base: 0x00000000    # SRAM
        size: 0x1000
        data_width: 32
      - base: 0x00010000    # UART
        size: 0x1000
        data_width: 32
      - base: 0x00020000    # GPIO
        size: 0x1000
        data_width: 32
      - base: 0x00030000    # SPI
        size: 0x1000
        data_width: 32

  # ── Example 2: 2 masters, register slices, weighted arbitration ──────────
  - name: MyLite_2M2S_WRR
    type: lite
    arbitration: weighted_round_robin
    weights: [3, 1]         # master 0 gets 3x the grants

    masters:
      - addr_width: 32
        data_width: 32
        reg_slice: true     # register slice on this master port
      - addr_width: 32
        data_width: 32
        reg_slice: false

    slaves:
      - base: 0x00000000
        size: 0x10000
        data_width: 32
        reg_slice: true     # register slice on this slave port
      - base: 0x00010000
        size: 0x10000
        data_width: 32

  # ── Example 3: fixed-priority arbitration ────────────────────────────────
  #
  # Master 0 (CPU) has highest priority; master 1 (DMA) is preempted whenever
  # the CPU also requests the same slave.  Priority is purely positional —
  # first master listed wins.  No extra keys beyond `arbitration` are needed.
  # Warning: master 1 may starve if master 0 never idles.
  #
  - name: MyLite_2M4S_FP
    type: lite
    arbitration: fixed_priority   # master 0 = highest, master 1 = lowest

    masters:
      - addr_width: 32             # master 0: CPU (highest priority)
        data_width: 32
      - addr_width: 32             # master 1: DMA (lowest priority)
        data_width: 32

    slaves:
      - base: 0x00000000    # SRAM
        size: 0x1000
        data_width: 32
      - base: 0x00010000    # UART
        size: 0x1000
        data_width: 32
      - base: 0x00020000    # GPIO
        size: 0x1000
        data_width: 32
      - base: 0x00030000    # SPI
        size: 0x1000
        data_width: 32

  # ── Example 4: full AXI4 (with IDs and bursts) ───────────────────────────
  - name: MyFull_2M2S
    type: full
    arbitration: round_robin

    masters:
      - addr_width: 32
        data_width: 64
        id_width: 4

    slaves:
      - base: 0x00000000
        size: 0x80000000    # 2 GB
        data_width: 64
      - base: 0x80000000
        size: 0x20000000    # 512 MB
        data_width: 64

  # ── Example 5: QoS-based arbitration (full AXI4) ────────────────────────
  #
  # Two masters contend for two slaves.  Arbitration uses AXQOS[3:0]:
  # the master with the higher QoS value wins when both request the same
  # slave simultaneously.  Equal QoS falls back to round-robin.
  # Aging counters prevent starvation of low-QoS masters.
  #
  - name: MyFull_2M2S_QoS
    type: full
    arbitration: qos
    max_outstanding: 4

    masters:
      - addr_width: 32
        data_width: 32
        id_width: 4
      - addr_width: 32
        data_width: 32
        id_width: 4

    slaves:
      - base: 0x00000000
        size: 0x10000
        data_width: 32
      - base: 0x00010000
        size: 0x10000
        data_width: 32

  # ── Example 6: mixed AXI4 + AXI4-Lite ports ──────────────────────────────
  #
  # A DMA engine (full AXI4, id_width=4) and a CPU config port (AXI4-Lite)
  # share three slaves: DDR (full AXI4) plus UART and GPIO (AXI4-Lite).
  #
  # The script automatically:
  #   • inserts Lite→Full adapters at Lite master ports
  #   • inserts Full→Lite adapters at Lite slave ports
  #   • computes the expanded slave ID width (effectiveIdW + masterIndexBits)
  #   • uses the resource-efficient Lite crossbar only when ALL ports are Lite
  #
  - name: MyMixed_2M3S
    arbitration: round_robin

    masters:
      - addr_width: 32
        data_width: 32
        id_width: 4
        type: full          # DMA engine — full AXI4
      - addr_width: 32
        data_width: 32
        type: lite          # CPU config port — AXI4-Lite

    slaves:
      - base: 0x00000000
        size: 0x80000000    # DDR — full AXI4
        data_width: 32
        type: full
      - base: 0x80000000
        size: 0x1000        # UART — AXI4-Lite
        data_width: 32
        type: lite
      - base: 0x80001000
        size: 0x1000        # GPIO — AXI4-Lite
        data_width: 32
        type: lite

  # ── Example 7: standalone AXI4-Stream utility cores ─────────────────────
  #
  # AXI Stream cores use kind: axis and do not have address maps.
  # Supported core values: reg_slice, width_adapter, fifo, arb_mux, demux, broadcaster.
  #
  - name: MyAxisRegSlice
    kind: axis
    core: reg_slice
    data_width: 32
    use_keep: true
    use_last: true

  - name: MyAxisWidth_8To32
    kind: axis
    core: width_adapter
    input_data_width: 8
    output_data_width: 32
    use_keep: true
    use_last: true

  - name: MyAxisFifo
    kind: axis
    core: fifo
    data_width: 32
    depth: 16
    use_keep: true
    use_last: true

  - name: MyAxisMux_2To1
    kind: axis
    core: arb_mux
    data_width: 32
    inputs: 2
    arbitration: round_robin
    use_keep: true
    use_last: true

  - name: MyAxisDemux_1To2
    kind: axis
    core: demux
    data_width: 32
    outputs: 2
    use_keep: true
    use_last: true

  - name: MyAxisBroadcaster_1To2
    kind: axis
    core: broadcaster
    data_width: 32
    outputs: 2
    use_keep: true
    use_last: true
