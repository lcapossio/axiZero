name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  # ── SpinalHDL compilation + SpinalSim unit tests ──────────────────────────
  spinal-sim:
    name: SpinalSim (sbt test)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-sbt

      - name: Install Verilator
        run: sudo apt-get install -y --no-install-recommends verilator

      - name: Compile (SpinalHDL)
        run: sbt compile

      - name: Check formatting (scalafmt)
        run: sbt scalafmtCheck

      - name: Run scalafix
        run: sbt "scalafix --check"

      - name: Coverage report (SpinalSim)
        # -Dcoverage=true must be set at JVM startup so scalacOptions are
        # evaluated correctly; coverageTest = test + coverageReport.
        run: sbt -Dcoverage=true coverageTest

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scoverage-report
          path: target/scala-2.13/scoverage-report/

      - name: Generator smoke test (axizero.py)
        run: |
          pip install pyyaml
          python3 scripts/axizero.py generate scripts/example.yaml

  # ── cocotb integration tests against pre-built generated Verilog ──────────
  cocotb:
    name: cocotb (generated Verilog)
    runs-on: ubuntu-24.04
    # Checked 2026-05-01: keep cocotb 1.9.2 until cocotbext-axi supports cocotb 2.x.
    # Track: https://github.com/alexforencich/cocotbext-axi/issues/119

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-sbt

      - name: Install Verilator
        run: sudo apt-get install -y --no-install-recommends verilator

      - name: Install Python dependencies
        run: pip install "cocotb==1.9.2" cocotbext-axi pyyaml

      - name: Lint Python (ruff)
        run: |
          pip install ruff
          ruff check scripts/ sim/

      - name: Run cocotb tests (lite + full + wrr + qos + ipif + axis)
        run: python3 sim/cocotb_gen/run_all.py

  formal:
    name: Formal checks
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-sbt

      - name: Set up OSS CAD Suite
        uses: YosysHQ/setup-oss-cad-suite@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Generate AXIS formal RTL
        run: |
          mkdir -p tmp/axis_formal
          cat > tmp/axis_formal/config.yaml <<'EOF'
          designs:
            - name: SmokeAxisRegSlice
              kind: axis
              core: reg_slice
              data_width: 32
              use_keep: true
              use_last: true
          EOF
          python3 scripts/axizero.py generate tmp/axis_formal/config.yaml --output tmp/axis_formal/rtl

      - name: Run SymbiYosys
        run: |
          cd formal
          sby -f write_response_routing.sby
          sby -f axis_ready_valid_regslice.sby
