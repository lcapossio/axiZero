name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  # ── SpinalHDL compilation + SpinalSim unit tests ──────────────────────────
  spinal-sim:
    name: SpinalSim (sbt test)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: sbt

      - name: Install sbt
        run: |
          wget -qO /tmp/sbt.tgz \
            https://github.com/sbt/sbt/releases/download/v1.9.9/sbt-1.9.9.tgz
          sudo tar -xzf /tmp/sbt.tgz -C /usr/local
          echo "/usr/local/sbt/bin" >> $GITHUB_PATH

      - name: Install Verilator
        run: sudo apt-get install -y --no-install-recommends verilator

      - name: Compile (SpinalHDL)
        run: sbt compile

      - name: Check formatting (scalafmt)
        run: sbt scalafmtCheck

      - name: Run scalafix
        run: sbt "scalafix --check"

      - name: Coverage report (SpinalSim)
        # -Dcoverage=true must be set at JVM startup so scalacOptions are
        # evaluated correctly; coverageTest = test + coverageReport.
        run: sbt -Dcoverage=true coverageTest

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scoverage-report
          path: target/scala-2.13/scoverage-report/

      - name: Generator smoke test (axizero.py)
        run: |
          pip install pyyaml
          python3 scripts/axizero.py generate scripts/example.yaml

  # ── cocotb integration tests against pre-built generated Verilog ──────────
  cocotb:
    name: cocotb (generated Verilog)
    runs-on: ubuntu-24.04
    # TODO: migrate to cocotb 2.x once cocotbext-axi has a compatible release.
    # Blocked on cocotbext-axi support for cocotb 2.0 runner API changes.
    # Track: https://github.com/alexforencich/cocotbext-axi/issues

    steps:
      - uses: actions/checkout@v4

      - name: Install Verilator
        run: sudo apt-get install -y --no-install-recommends verilator

      - name: Install Python dependencies
        run: pip install "cocotb==1.9.2" cocotbext-axi

      - name: Lint Python (ruff)
        run: |
          pip install ruff
          ruff check scripts/ sim/

      - name: Run cocotb tests (lite + full + wrr + qos + ipif)
        run: python3 sim/cocotb_gen/run_all.py
